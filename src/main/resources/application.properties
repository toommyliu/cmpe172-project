spring.application.name=starter-demo

spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp
spring.mvc.view.cache=false

management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=when_authorized

salon.db.url=${SALON_DB_URL:jdbc:mysql://localhost:3306/salon?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
salon.db.username=${SALON_DB_USER:root}
salon.db.password=${SALON_DB_PASSWORD:password}

salon.auth.bootstrap-enabled=${SALON_AUTH_BOOTSTRAP_ENABLED:true}
salon.auth.admin.email=${SALON_AUTH_ADMIN_EMAIL:a@a.com}
salon.auth.admin.password=${SALON_AUTH_ADMIN_PASSWORD:password}
salon.auth.admin.first-name=${SALON_AUTH_ADMIN_FIRST_NAME:Admin}
salon.auth.admin.last-name=${SALON_AUTH_ADMIN_LAST_NAME:User}
salon.auth.customer.email=${SALON_AUTH_CUSTOMER_EMAIL:c@c.com}
salon.auth.customer.password=${SALON_AUTH_CUSTOMER_PASSWORD:password}
salon.auth.customer.first-name=${SALON_AUTH_CUSTOMER_FIRST_NAME:Customer}
salon.auth.customer.last-name=${SALON_AUTH_CUSTOMER_LAST_NAME:User}
salon.auth.stylist.email=${SALON_AUTH_STYLIST_EMAIL:s@s.com}
salon.auth.stylist.password=${SALON_AUTH_STYLIST_PASSWORD:password}
salon.auth.stylist.first-name=${SALON_AUTH_STYLIST_FIRST_NAME:Stylist}
salon.auth.stylist.last-name=${SALON_AUTH_STYLIST_LAST_NAME:User}

salon.external.notification.base-url=${SALON_NOTIFICATION_BASE_URL:http://localhost:${server.port:8080}/mock-external}
salon.external.notification.api-key=${SALON_NOTIFICATION_API_KEY:super_duper_secret_key}

# https://docs.spring.io/spring-boot/docs/2.0.x/reference/html/howto-hotswapping.html
spring.devtools.livereload.enabled=true
spring.devtools.restart.enabled=true
server.servlet.jsp.init-parameters.development=true
